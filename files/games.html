<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA-UC Games Portal</title>
    <style>
        /* 1. Fondo Espacial */
        body {
            background-color: #050505; /* Negro profundo */
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 40px;
            overflow-x: hidden;
        }

        /* 2. Título con Efecto Neón */
        h1 {
            text-align: center;
            font-size: 3rem;
            color: #fff;
            text-shadow: 0 0 10px #bc13fe, 0 0 20px #bc13fe, 0 0 40px #bc13fe;
            margin-bottom: 50px;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        /* 3. El Grid de 2 Columnas */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Dos columnas iguales */
            gap: 40px;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* 4. Estilo de los Recuadros (Neon Cards) */
        .game-card {
            background: rgba(20, 20, 20, 0.8);
            border: 2px solid #0ff; /* Borde Cian Neón */
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            text-decoration: none;
            color: white;
        }

        .game-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 0 20px #0ff, 0 0 40px rgba(0, 255, 255, 0.6);
            border-color: #fff;
        }

        /* Variamos el color del neón para el segundo juego */
        .game-card.alt {
            border-color: #ff00ff; /* Magenta Neón */
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.3);
        }

        .game-card.alt:hover {
            box-shadow: 0 0 20px #ff00ff, 0 0 40px rgba(255, 0, 255, 0.6);
        }

        /* 5. Imagen de Previsualización */
        .preview-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-bottom: 2px solid inherit;
            opacity: 0.8;
        }

        .game-card:hover .preview-img {
            opacity: 1;
        }

        /* 6. Info del Juego */
        .game-info {
            padding: 20px;
            text-align: left;
        }

        .game-info h3 {
            margin: 0;
            font-size: 1.5rem;
            color: #0ff;
        }

        .game-card.alt .game-info h3 {
            color: #ff00ff;
        }

        .game-info p {
            margin: 10px 0 0;
            font-size: 0.9rem;
            color: #aaa;
            font-style: italic;
        }

        .author {
            color: #fff !important;
            font-weight: bold;
        }

        /* Botón Volver */
        .back-home {
            display: block;
            text-align: center;
            margin-top: 60px;
            color: #444;
            text-decoration: none;
        }

        .back-home:hover { color: #0ff; }

        /* Ajuste para celulares */
        @media (max-width: 768px) {
            .games-grid {
                grid-template-columns: 1fr; /* Una columna en móvil */
            }
        }
    </style>
</head>
<body>

    <h1>Arcade Repository</h1>

    <div class="games-grid">

        <a href="#" class="game-card">
            <img src="https://images.unsplash.com/photo-1614728263952-84ea256f9679" alt="Juego 1" class="preview-img">
            <div class="game-info">
                <h3>Space Invaders UC</h3>
                <p>Created by: <span class="author">Hernán S.</span></p>
            </div>
        </a>

        <a href="#" class="game-card alt">
            <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f" alt="Juego 2" class="preview-img">
            <div class="game-info">
                <h3>Galaxy Quest</h3>
                <p>Created by: <span class="author">Camila R.</span></p>
            </div>
        </a>

        </div>

    <a href="index.html" class="back-home">← Return to Headquarters</a>

</body>
</html>
