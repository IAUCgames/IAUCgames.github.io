<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudiantes IA-UC</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica', Arial, sans-serif;
            line-height: 1.6;
            background-color: #f0f2f5;
            color: #333;
        }

        /* 1. Portada - Subí la altura a 500px para que luzca más */
        .hero {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('Images/ia_uc.jpeg'); 
            background-size: cover;
            background-position: center;
            height: 500px; 
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .hero h1 {
            font-size: 3.5rem;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        /* 2. Bloque Blanco - Quitamos el margen negativo para que baje */
        .main-content {
            max-width: 900px;
            margin: 40px auto; /* Cambiado de -30px a 40px para que baje de la foto */
            background: white;
            padding: 60px 50px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        .logo-img {
            max-width: 250px;
            height: auto;
            margin-bottom: 40px; /* Más espacio bajo el logo */
        }

        /* 3. Botón Games */
        .btn-container {
            margin-top: 60px; /* Espacio generoso antes del botón */
        }

        .btn-games {
            display: inline-block;
            background: #6E0053;
            color: white;
            padding: 20px 50px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(26, 42, 108, 0.3);
        }

        .btn-games:hover {
            background: #b21f1f;
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(178, 31, 31, 0.4);
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #888;
        }
    </style>
</head>
<body>

    <header class="hero">
        <h1>Estudiantes IA-UC</h1>
    </header>

    <main class="main-content">
        <img src="Images/AstrofisicaUC_04.png" alt="Logo Astrofísica" class="logo-img">
        
        <div class="intro">
            <h2>Portal de Investigación</h2>
            <p>Bienvenido al espacio de trabajo de Astrofísica e Inteligencia Artificial.</p>
        </div>

        <div class="btn-container">
            <a href="games.html" class="btn-games">🕹️ Entrar a Games</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 - Astrofísica UC</p>
    </footer>

</body>
</html>
