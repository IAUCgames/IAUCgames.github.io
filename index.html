<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Sitio Astral</title>

    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica', Arial, sans-serif;
            line-height: 1.6;
            background-color: #f0f2f5;
            color: #333;
        }

        /* 1. Portada Superior (Hero) */
        .hero {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('Images/ia_uc.jpeg'); 
            background-size: cover;
            background-position: center;
            height: 450px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* 2. El Logo (Debajo de la portada) */
        .main-content {
            max-width: 900px;
            margin: -30px auto 40px; 
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
        }

        .logo-img {
            max-width: 220px;
            height: auto;
            margin-bottom: 25px;
            transition: transform 0.3s ease;
        }

        .logo-img:hover {
            transform: scale(1.05);
        }

        /* 3. Botón para Games */
        .btn-container {
            margin-top: 100px;
        }

        .btn-games {
            display: inline-block;
            background: #1a2a6c; /* Azul oscuro espacial */
            color: white;
            padding: 18px 40px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(26, 42, 108, 0.3);
        }

        .btn-games:hover {
            background: #b21f1f; /* Cambia a rojo al pasar el mouse */
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(178, 31, 31, 0.4);
        }

        footer {
            text-align: center;
            padding: 30px;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>

    <header class="hero">
        <h1>Estudiantes IA-UC</h1>
        
    </header>

    <main class="main-content">
        <img src="Images/AstrofisicaUC_04.png" alt="Logo Astrofísica" class="logo-img">
        
        <div class="intro">
            <h2></h2>
            <p></p>
        </div>

        <div class="btn-container">
            <a href="games.html" class="btn-games"> Games</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 - Astrofísica UC</p>
    </footer>

</body>
</html>
