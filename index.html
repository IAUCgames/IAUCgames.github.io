<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudiantes IA-UC</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica', Arial, sans-serif;
            line-height: 1.6;
            background-color: #f0f2f5;
            color: #333;
        }

        /* 1. Portada */
        .hero {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('Images/ia_uc.jpeg'); 
            background-size: cover;
            background-position: center;
            height: 500px; 
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .hero h1 {
            font-size: 3.5rem;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        /* 2. Contenedor del Logo (FUERA del recuadro) */
        .logo-wrapper {
            text-align: center;
            margin-top: 50px; /* Espacio entre la foto y el logo */
        }

        .logo-img {
            max-width: 800px;
            height: auto;
            transition: transform 0.3s ease;
        }

        .logo-img:hover {
            transform: scale(1.05);
        }

        /* 3. Recuadro Blanco (Ahora más abajo) */
        .main-content {
            max-width: 700px; /* Un poco más angosto para que se vea más ordenado */
            margin: 30px auto 60px; /* Margen superior para alejarse del logo */
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* 4. Botón Games */
        .btn-container {
            margin-top: 40px;
        }

        .btn-games {
            display: inline-block;
            background: #6E0053; /* El color que elegiste */
            color: white;
            padding: 20px 60px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.3rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(110, 0, 83, 0.3);
        }

        .btn-games:hover {
            background: #b21f1f;
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(178, 31, 31, 0.4);
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #888;
        }
    </style>
</head>
<body>

    <header class="hero">
        <h1>Estudiantes IA-UC</h1>
    </header>

    <div class="logo-wrapper">
        <img src="Images/AstrofisicaUC_04.png" alt="Logo Astrofísica" class="logo-img">
    </div>

    <main class="main-content">
        <div class="intro">
            <h2>Videogames Portal</h2>
            <p>Select</p>
        </div>

        <div class="btn-container">
            <a href="games.html" class="btn-games">🕹️ Start</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 - Astrofísica UC</p>
    </footer>

</body>
</html>
